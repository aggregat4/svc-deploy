# golangci-lint configuration - pragmatic defaults
# Focus on catching bugs, not style nitpicks

run:
  timeout: 5m
  go: "1.26"

linters:
  enable:
    # Core correctness linters
    - errcheck      # Unchecked errors
    - gosimple      # Simplifications
    - govet         # Go vet analysis
    - ineffassign   # Ineffective assignments
    - staticcheck   # Static analysis
    - unused        # Unused code
    # Basic style
    - gofmt         # Formatting
    - goimports     # Import ordering
  
  disable:
    # Too noisy for our use case
    - gocritic      # Style opinions (hugeParam, octalLiteral, etc.)
    - revive        # Documentation requirements
    - gosec         # Security (many false positives)
    - unparam       # Unused params (tests/mocks trigger this)
    - prealloc      # Preallocation hints
    - errorlint     # Error wrapping style

issues:
  exclude-use-default: true
  exclude-dirs:
    - vendor
  max-issues-per-linter: 0
  max-same-issues: 0
  
  exclude-rules:
    # Don't require error check on Close() in defer - common pattern
    - text: "Error return value of `.*\\.Close` is not checked"
      linters:
        - errcheck
    # Don't require error check on Remove/RemoveAll cleanup
    - text: "Error return value of `.*\\.Remove(All)?` is not checked"
      linters:
        - errcheck
    # Don't require error check on simple writes
    - text: "Error return value of `fmt\\.(Fprint|Print|Sprint)"
      linters:
        - errcheck
